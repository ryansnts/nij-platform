name: CI/CD — NIJ Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/nij-backend
  IMAGE_FRONTEND: ${{ github.repository }}/nij-frontend

jobs:
  # ── Backend Tests ──────────────────────────────────────
  backend-test:
    name: Backend — Django Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nij_test
          POSTGRES_USER: nij_user
          POSTGRES_PASSWORD: nij_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        run: sudo apt-get install -y tesseract-ocr tesseract-ocr-por

      - name: Install Python deps
        run: pip install -r backend/requirements.txt
        working-directory: nij-platform

      - name: Run Django tests
        working-directory: nij-platform/backend
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          DEBUG: "True"
          DATABASE_URL: postgres://nij_user:nij_pass@localhost:5432/nij_test
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py test --verbosity=2

  # ── Frontend Tests ─────────────────────────────────────
  frontend-test:
    name: Frontend — TypeScript + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nij-platform/frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: nij-platform/frontend

      - name: Type check
        run: npm run type-check
        working-directory: nij-platform/frontend

      - name: Lint
        run: npm run lint
        working-directory: nij-platform/frontend

  # ── Build & Push Docker Images ─────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: nij-platform/backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: nij-platform/frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
          build-args: NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/nij-platform
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T backend python manage.py migrate --noinput
            docker image prune -f
